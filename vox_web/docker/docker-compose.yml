version: "3.9"
services:
  web:
    image: ${DOCKER_REGISTRY}/vox-web:${TAG}
    ports:
      - target: 80
        published: 9082
        mode: host
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
        failure_action: rollback
      rollback_config:
        parallelism: 1
        delay: 5s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
      healthcheck:
        test: ["CMD-SHELL", "nginx -t 2>/dev/null || exit 1"]
        interval: 15s
        timeout: 5s
        retries: 3
        start_period: 10s
