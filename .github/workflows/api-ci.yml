name: API CI

on:
  push:
    paths:
      - "vox_api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    paths:
      - "vox_api/**"
      - ".github/workflows/api-ci.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality-gate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: vox_api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: vox_api/go.mod
          cache: true
          cache-dependency-path: vox_api/go.sum

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.8.0
          working-directory: vox_api

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Security scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.1.3 ./...

  unit-tests:
    needs: quality-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: vox_api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: vox_api/go.mod
          cache: true
          cache-dependency-path: vox_api/go.sum

      - name: Run Unit Tests
        run: go test -race -count=1 -tags=unit -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: vox_api/coverage.out
          flags: unit

  integration-tests:
    needs: quality-gate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: vox_api
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: vox_api/go.mod
          cache: true
          cache-dependency-path: vox_api/go.sum

      - name: Run Integration Tests
        run: go test -race -count=1 -tags=integration ./...
